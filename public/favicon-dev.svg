<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>
  <!-- Shackle (U-shape) -->
  <path d="M10.5 16 V8 A5.5 5.5 0 0 1 21.5 8 V16" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="6" y="15" width="20" height="14" rx="3" fill="#60a5fa"/>
  <!-- Keyhole -->
  <circle cx="16" cy="21" r="2.5" fill="#1a1a1a"/>
  <rect x="15" y="22" width="2" height="4" rx="0.5" fill="#1a1a1a"/>
  <!-- DEV banner (diagonal stripe across icon) -->
  <rect x="-4" y="11" width="40" height="14" fill="#f59e0b" transform="rotate(-15 16 16)"/>
  <text x="16" y="22.5" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="900" fill="#000" transform="rotate(-15 16 16)">DEV</text>
</svg>
